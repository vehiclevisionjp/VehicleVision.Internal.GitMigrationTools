name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  python-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Compile Check
        run: |
          python -m py_compile git_migration_gui.py
